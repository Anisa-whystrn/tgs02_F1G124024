<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism To-Do List</title>
    <!-- Menghubungkan file CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome untuk ikon (opsional, agar lebih bagus) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Container Utama -->
    <main class="container">
        
        <!-- Header / Judul -->
        <header>
            <h1>My Tasks</h1>
            <p>Organize your day efficiently</p>
        </header>

        <!-- Bagian Input Task -->
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn"><i class="fas fa-plus"></i> Add</button>
        </div>

        <!-- Bagian Filter -->
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
        </div>

        <!-- Daftar Task (List) -->
        <ul id="todo-list" class="todo-list">
            <!-- Item task akan muncul di sini secara dinamis lewat JavaScript -->
        </ul>

        <!-- Footer kecil -->
        <div class="footer-info">
            <span id="items-left">0 items left</span>
        </div>

    </main>

    <!-- Menghubungkan file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
